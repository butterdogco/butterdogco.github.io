name: Build and Deploy with Gulp
on:
  push:
    branches: ["main"]
  
  # Allow manual triggering of the workflow from the GitHub Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow pushing to GitHub Pages
permissions:
  contents: read
  pages: write

# Ensure that only one deployment runs at a time to prevent conflicts
concurrency:
  group: "pages"
  cancel-in-progress: false

# Define the jobs for building and deploying the site
jobs:
  # Build the site using Gulp
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
  # Deploy the built site to GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist